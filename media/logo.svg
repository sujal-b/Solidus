<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="coin-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
  </defs>

  <!-- Coin circle -->
  <circle cx="45" cy="50" r="38" fill="url(#coin-bg)" stroke="url(#coin)" stroke-width="2.5"/>

  <!-- Stylized "S" as a solid/shield form -->
  <path d="M27 38 Q27 28 37 28 Q45 28 47 34 Q49 38 45 42 L36 46 Q28 50 28 58 Q28 68 38 68 Q48 68 53 60"
        fill="none" stroke="url(#coin)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "solidus" text -->
  <text x="100" y="46" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="28" font-weight="700" fill="#1e1b4b" letter-spacing="-0.5">solidus</text>

  <!-- Tagline -->
  <text x="100" y="67" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="13" fill="#6b7280" letter-spacing="0.3">Statistical flaky-test detection &amp; quarantine</text>
</svg>
